<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchSense Timer Web App</title>
    <style>
        /* Base Dark Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Modal (Pop-up) Styles */
        #setupModal {
            display: none; /* Hidden by default, JS will reveal it */
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #1e1e1e;
            padding: 2.5rem;
            border-radius: 12px;
            text-align: center;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { margin-top: 0; font-size: 2rem; }
        p.subtitle { color: #aaaaaa; margin-bottom: 2rem; }

        /* Device Grid */
        .device-grid {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .device-card {
            background-color: #2a2a2a;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
        }

        .device-card:hover {
            border-color: #4CAF50;
            transform: translateY(-5px);
            background-color: #333333;
        }

        /* Placeholder for actual device images */
        .device-img {
            width: 100%;
            height: 140px;
            background-color: #444;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 0.9rem;
        }

        .device-card h3 { margin: 0 0 0.5rem 0; color: #fff; }
        .device-card p { margin: 0; color: #aaa; font-size: 0.9rem; }

        /* Temporary Main App Interface */
        #mainApp { display: none; text-align: center; }
        .reset-btn { margin-top: 20px; padding: 10px 20px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .reset-btn:hover { background: #555; }
    </style>
</head>
<body>

    <div id="setupModal">
        <div class="modal-content">
            <h2>Hardware Setup</h2>
            <p class="subtitle">Select your device to configure the connection protocol.</p>

            <div class="device-grid">
                <div class="device-card" onclick="selectDevice('ghost')">
                    <div class="device-img">[Insert UNO Photo Here]</div>
                    <h3>The Ghost</h3>
                    <p>Arduino UNO R3 (Wired USB)</p>
                </div>

                <div class="device-card" onclick="selectDevice('esp')">
                    <div class="device-img">[Insert ESP32 Photo Here]</div>
                    <h3>The Pro</h3>
                    <p>ESP32-C3 (Wireless Bluetooth)</p>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp">
        <h1 style="font-size: 4rem;">0.000</h1>
        <p>Active Connection: <strong id="activeDevice" style="color: #4CAF50;">None</strong></p>

        <button class="reset-btn" onclick="resetSetup()">Reset Choice (Debug)</button>
    </div>

    <script>
        // 1. When the page loads, check memory
        document.addEventListener('DOMContentLoaded', () => {
            const savedDevice = localStorage.getItem('stackmatDevice');

            if (!savedDevice) {
                // No device saved? Show the modal.
                document.getElementById('setupModal').style.display = 'flex';
            } else {
                // Already set up? Skip straight to the main app.
                loadMainApp(savedDevice);
            }
        });

        // 2. Function triggered when a user clicks a device card
        function selectDevice(deviceType) {
            // Save it forever in the browser
            localStorage.setItem('stackmatDevice', deviceType);

            // Hide the modal
            document.getElementById('setupModal').style.display = 'none';

            // Boot up the main app
            loadMainApp(deviceType);
        }

        // 3. Function to initialize the main interface
        function loadMainApp(deviceType) {
            document.getElementById('mainApp').style.display = 'block';

            // Update the UI based on what they picked
            const deviceName = (deviceType === 'ghost') ? 'Arduino UNO (USB Serial)' : 'ESP32 (Bluetooth BLE)';
            document.getElementById('activeDevice').innerText = deviceName;
        }

        // 4. Debug function (so you can test the popup multiple times)
        function resetSetup() {
            localStorage.removeItem('stackmatDevice');
            location.reload();
        }
    </script>
</body>
</html>
